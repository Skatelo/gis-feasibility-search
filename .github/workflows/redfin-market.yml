name: Refresh Redfin NC market data

# Redfin Data Center refreshes its county tracker monthly (mid-month, for the
# prior month). Run on the 18th to pick up the latest, plus manual dispatch.
on:
  schedule:
    - cron: '0 9 18 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Digest Redfin county market data → NC JSON
        run: node scripts/redfin-digest.mjs
      - name: Commit if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market/nc-county-redfin.json
          if git diff --staged --quiet; then
            echo "No change in Redfin market data."
          else
            git commit -m "chore: refresh Redfin NC county market data"
            git push
          fi
